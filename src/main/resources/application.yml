spring:
  application:
    name: flexsys-backend

  # ── MVC / Error Handling ────────────────────────────────────────────
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

  # ── Upload / Request size ────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ── Banco de dados ──────────────────────────────────────────────────
  datasource:
    url: jdbc:h2:mem:flexsysdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      # Dev (H2): Hibernate cria/recria as tabelas automaticamente
      # Prod (PostgreSQL): usa 'validate' + Liquibase (ver application-prod.yml)
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  # ── Liquibase — DESABILITADO em dev (H2) ────────────────────────────
  # Em produção com PostgreSQL: habilitado via application-prod.yml
  liquibase:
    enabled: false

# ── Servidor ────────────────────────────────────────────────────────
server:
  port: 8080
  tomcat:
    max-http-form-post-size: 20971520  # 20MB para suportar base64 de fotos

# ── JWT ─────────────────────────────────────────────────────────────
flexsys:
  jwt:
    secret: ${JWT_SECRET:flexsys-jwt-secret-key-2024-muito-seguro-e-longo-para-hmac-sha256}
    expiration: 86400000  # 24 horas em ms
    refresh-expiration: 604800000  # 7 dias em ms
  cors:
    allowed-origins: "http://localhost:4200,http://localhost:4201"

# ── Logging ─────────────────────────────────────────────────────────
logging:
  level:
    com.flexsys: DEBUG
    org.springframework.security: INFO

# ── SpringDoc / Swagger UI ───────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
    filter: true
    displayRequestDuration: true
  show-actuator: false
  packages-to-scan: com.flexsys.controller

# ── DevTools ────────────────────────────────────────────────────────
  devtools:
    restart:
      enabled: true
      poll-interval: 2000ms
    livereload:
      enabled: false

# ── Actuator ────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, metrics, env
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: FlexSys Backend
    version: 1.0.0
    description: API REST do sistema FlexSys
