spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:autooriondb}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:autoorion}
    password: ${DB_PASSWORD:autoorion123}

  jpa:
    hibernate:
      # Prod: Liquibase gerencia o schema, Hibernate apenas valida
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Liquibase HABILITADO em produÃ§Ã£o
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  h2:
    console:
      enabled: false
